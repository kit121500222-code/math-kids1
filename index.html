<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小天才數學練習</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #7ED321;
            --bg-color: #F0F4F8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #progress-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
        }

        #progress-inner {
            height: 100%;
            background: var(--success-color);
            width: 0%;
            transition: width 0.3s;
        }

        .container {
            flex: 1;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .question-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        #question-text {
            font-size: 1.4rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        #visual-hint {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        #answer-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            min-height: 3.5rem;
            border-bottom: 3px solid var(--primary-color);
            margin: 10px auto;
            width: 100px;
        }

        /* 虛擬數字鍵盤 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            padding-bottom: 30px;
        }

        .key {
            background: white;
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
            active: background-color: #eee;
        }

        .key.delete { color: #D0021B; }
        .key.submit { background: var(--primary-color); color: white; border: none; }

        /* iPhone Safari 點擊縮放修正 */
        button { touch-action: manipulation; }
    </style>
</head>
<body>

<div id="progress-bar"><div id="progress-inner"></div></div>

<div class="container">
    <div class="question-card">
        <div id="visual-hint">🍎</div>
        <div id="question-text">載入中...</div>
        <div id="answer-display"></div>
    </div>

    <div class="keypad">
        <button class="key" onclick="appendNumber(1)">1</button>
        <button class="key" onclick="appendNumber(2)">2</button>
        <button class="key" onclick="appendNumber(3)">3</button>
        <button class="key" onclick="appendNumber(4)">4</button>
        <button class="key" onclick="appendNumber(5)">5</button>
        <button class="key" onclick="appendNumber(6)">6</button>
        <button class="key" onclick="appendNumber(7)">7</button>
        <button class="key" onclick="appendNumber(8)">8</button>
        <button class="key" onclick="appendNumber(9)">9</button>
        <button class="key delete" onclick="clearAnswer()">C</button>
        <button class="key" onclick="appendNumber(0)">0</button>
        <button class="key submit" onclick="checkAnswer()">確認</button>
    </div>
</div>

<script>
    let currentQuestion = 0;
    const totalQuestions = 50;
    let correctAnswer = 0;
    let userTyped = "";

    const scenarios = [
        { text: "樹上有 {n1} 隻小鳥，又飛來了 {n2} 隻，現在一共有幾隻？", icon: "🐦", type: "+" },
        { text: "小明有 {n1} 個蘋果，吃了 {n2} 個，還剩下幾個？", icon: "🍎", type: "-" },
        { text: "停車場原本有 {n1} 輛車，開走了 {n2} 輛，還剩幾輛？", icon: "🚗", type: "-" },
        { text: "我有 {n1} 塊餅乾，媽媽又給我 {n2} 塊，我現在有幾塊？", icon: "🍪", type: "+" }
    ];

    function generateQuestion() {
        if (currentQuestion >= totalQuestions) {
            document.querySelector('.container').innerHTML = "<h1>🎉 太棒了！你完成了所有練習！</h1>";
            return;
        }

        const scene = scenarios[Math.floor(Math.random() * scenarios.length)];
        let n1 = Math.floor(Math.random() * 10) + 5;
        let n2 = Math.floor(Math.random() * 9) + 1;

        if (scene.type === "-") {
            if (n1 < n2) [n1, n2] = [n2, n1];
            correctAnswer = n1 - n2;
        } else {
            correctAnswer = n1 + n2;
        }

        document.getElementById('question-text').innerText = scene.text.replace("{n1}", n1).replace("{n2}", n2);
        document.getElementById('visual-hint').innerText = scene.icon;
        document.getElementById('answer-display').innerText = "";
        userTyped = "";

        updateProgress();
    }

    function appendNumber(num) {
        if (userTyped.length < 3) {
            userTyped += num;
            document.getElementById('answer-display').innerText = userTyped;
        }
    }

    function clearAnswer() {
        userTyped = "";
        document.getElementById('answer-display').innerText = "";
    }

    function checkAnswer() {
        if (parseInt(userTyped) === correctAnswer) {
            // 答對了！噴放煙火
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            currentQuestion++;
            setTimeout(generateQuestion, 1500);
        } else {
            // 答錯震動提示（如果設備支援）
            if (navigator.vibrate) navigator.vibrate(200);
            alert("再試一次看看喔！");
            clearAnswer();
        }
    }

    function updateProgress() {
        const percent = (currentQuestion / totalQuestions) * 100;
        document.getElementById('progress-inner').style.width = percent + "%";
    }

    // 初始化第一題
    generateQuestion();
</script>

</body>
</html>
