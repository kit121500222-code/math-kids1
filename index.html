<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學大師進階版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #5856D6;
            --secondary: #FF9500;
            --success: #34C759;
            --bg: #F2F2F7;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }

        /* 頂部資訊欄 */
        .header {
            padding: 15px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #timer { font-family: monospace; font-size: 1.2rem; color: var(--primary); }

        /* 進度條 */
        .progress-container { width: 100%; height: 6px; background: #E5E5EA; }
        #progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }

        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 350px;
            border-radius: 25px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
        }

        #q-text { font-size: 1.5rem; line-height: 1.5; margin-bottom: 20px; min-height: 80px; }

        /* 答案槽位 */
        .answer-box {
            font-size: 3rem;
            color: var(--primary);
            border-bottom: 4px dashed #CCC;
            display: inline-block;
            min-width: 80px;
            height: 60px;
            margin-bottom: 20px;
        }

        /* 數字鍵盤優化 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        .key {
            background: white;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 1.4rem;
            font-weight: 600;
            box-shadow: 0 4px 0 #DDD;
            transition: 0.1s;
        }

        .key:active { transform: translateY(4px); box-shadow: none; background: #F2F2F7; }

        .key.del { color: #FF3B30; }
        .key.go { background: var(--primary); color: white; box-shadow: 0 4px 0 #3E3B9E; }

        /* 結果頁面 */
        #result-screen {
            display: none;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="header">
        <div id="q-count">第 1 / 50 題</div>
        <div id="timer">00:00</div>
    </div>
    <div class="progress-container"><div id="progress-fill"></div></div>

    <div class="main-content">
        <div class="card">
            <div id="q-text">準備好了嗎？</div>
            <div class="answer-box" id="display"></div>
        </div>

        <div class="keypad">
            <button class="key" onclick="press(1)">1</button>
            <button class="key" onclick="press(2)">2</button>
            <button class="key" onclick="press(3)">3</button>
            <button class="key" onclick="press(4)">4</button>
            <button class="key" onclick="press(5)">5</button>
            <button class="key" onclick="press(6)">6</button>
            <button class="key" onclick="press(7)">7</button>
            <button class="key" onclick="press(8)">8</button>
            <button class="key" onclick="press(9)">9</button>
            <button class="key del" onclick="press('C')">C</button>
            <button class="key" onclick="press(0)">0</button>
            <button class="key go" onclick="check()">OK</button>
        </div>
    </div>
</div>

<div id="result-screen">
    <h1 id="final-title">🎉 完成挑戰！</h1>
    <p id="final-time"></p>
    <div id="history-list" style="text-align: left; background: white; border-radius: 15px; padding: 15px; margin-top: 20px;"></div>
    <button onclick="location.reload()" style="margin-top: 30px; padding: 15px 40px; border-radius: 30px; border: none; background: var(--success); color: white; font-size: 1.2rem;">再玩一次</button>
</div>

<script>
    let score = 0;
    let currentIdx = 1;
    const total = 50;
    let answer = 0;
    let input = "";
    let startTime = Date.now();
    let history = [];

    // 自動生成多樣化題型
    function generate() {
        const type = Math.random();
        let n1, n2, txt;

        if (type < 0.4) { // 普通加法
            n1 = Math.floor(Math.random() * 20) + 10;
            n2 = Math.floor(Math.random() * 20) + 5;
            answer = n1 + n2;
            txt = `${n1} + ${n2} = ?`;
        } else if (type < 0.7) { // 普通減法
            n1 = Math.floor(Math.random() * 30) + 20;
            n2 = Math.floor(Math.random() * 15) + 1;
            answer = n1 - n2;
            txt = `${n1} - ${n2} = ?`;
        } else { // 填空題 (進階)
            answer = Math.floor(Math.random() * 10) + 2;
            n1 = Math.floor(Math.random() * 10) + 5;
            let sum = n1 + answer;
            txt = `${n1} + ( ) = ${sum}`;
        }

        document.getElementById('q-text').innerHTML = `<h3>第 ${currentIdx} 題</h3>${txt}`;
        document.getElementById('q-count').innerText = `第 ${currentIdx} / ${total} 題`;
        document.getElementById('progress-fill').style.width = `${(currentIdx/total)*100}%`;
        input = "";
        updateDisplay();
    }

    function press(val) {
        if (val === 'C') input = "";
        else if (input.length < 3) input += val;
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('display').innerText = input;
    }

    function check() {
        const userAns = parseInt(input);
        const qText = document.getElementById('q-text').innerText.split('\n')[1];

        if (userAns === answer) {
            confetti({ particleCount: 100, spread: 50, origin: { y: 0.8 } });
            history.push({ q: qText, a: answer, u: userAns, correct: true });

            if (currentIdx < total) {
                currentIdx++;
                setTimeout(generate, 800);
            } else {
                showResult();
            }
        } else {
            history.push({ q: qText, a: answer, u: userAns, correct: false });
            alert("哎呀！算錯囉，再想一下！");
            input = "";
            updateDisplay();
        }
    }

    function showResult() {
        const timeUsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-time').innerText = `總共用時：${Math.floor(timeUsed/60)}分${timeUsed%60}秒`;

        let html = "<h3>答題清單：</h3>";
        history.forEach((item, idx) => {
            html += `<div style="color: ${item.correct ? '#34C759' : '#FF3B30'}; margin-bottom: 5px;">
                ${idx+1}. ${item.q} → 正確答案: ${item.a} ${item.correct ? '✅' : '❌ (你填 '+item.u+')'}
            </div>`;
        });
        document.getElementById('history-list').innerHTML = html;
    }

    // 計時器
    setInterval(() => {
        const s = Math.floor((Date.now() - startTime) / 1000);
        const m = Math.floor(s / 60);
        document.getElementById('timer').innerText =
            `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }, 1000);

    generate();
</script>

</body>
</html>
